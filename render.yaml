services:
  - type: web
    name: fl-platform-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.tasks.celery_app.celery_app worker --loglevel=info & uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: redis
          name: fl-redis
          property: connectionString
      - key: MLFLOW_TRACKING_URI
        value: http://localhost:5000
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: "https://fl-platform-ui.onrender.com,https://fl-platform-ui-8vqt.onrender.com,http://localhost:5173"

  - type: redis
    name: fl-redis
    plan: free
    ipAllowList: []

  - type: web
    name: fl-platform-ui
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    envVars:
      - key: VITE_API_URL
        value: https://fl-platform-api.onrender.com
      - key: VITE_SUPABASE_URL
        value: https://gxrnjyurzoegbhljkyda.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
        value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4cm5qeXVyem9lZ2JobGpreWRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNTE1NjksImV4cCI6MjA5NjgyNzU2OX0.OBxEaI6uXkOuprC41uUIjq-0LeWyY8NejA3fouSsNEk
    staticPublishPath: dist
    headers:
      - path: /*
        name: Strict-Transport-Security
        value: max-age=31536000; includeSubDomains
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.onrender.com wss://*.onrender.com https://fl-platform-api.onrender.com;"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
