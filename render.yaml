services:
  # ─── Backend: FastAPI ───────────────────────────────────────────────────────
  - type: web
    name: fl-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false          # Set this manually in the Render dashboard
      - key: REDIS_URL
        fromService:
          name: fl-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHONPATH
        value: /app

  # ─── Frontend: React + Vite ─────────────────────────────────────────────────
  - type: web
    name: fl-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://fl-backend-4l71.onrender.com

  # ─── Redis ──────────────────────────────────────────────────────────────────
  - type: redis
    name: fl-redis
    plan: free
    ipAllowList: []
